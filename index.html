  <!-- Landing Page -->
  <div id="landing" class="page">
    <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему">
      <svg class="icon"><use href="#icon-sun"/></svg>
    </button>
    
    <div class="hero">
      <div class="logo">
        <svg class="icon-lg"><use href="#icon-cash"/></svg>
      </div>
      <h1>Мобильная касса</h1>
      <p class="tagline">Кассовые операции и аналитика</p>
      <p class="desc">Современная POS-система для кафе и ресторанов с интеграцией BigData и SmartData аналитики</p>
      
      <div class="features">
        <div class="feature">
          <svg class="icon"><use href="#icon-wallet"/></svg>
          <span>Продажи</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-chart"/></svg>
          <span>Аналитика</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-database"/></svg>
          <span>BigData</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-clipboard"/></svg>
          <span>Остатки</span>
        </div>
      </div>
      
      <!-- Кассир / Администратор Toggle -->
      <div class="mode-toggle-wrapper">
        <span id="cashierLabel" class="mode-label active">Кассир</span>
        <div class="mode-toggle" onclick="toggleMode()">
          <div class="mode-toggle-knob" id="modeKnob"></div>
        </div>
        <span id="adminLabel" class="mode-label">Администратор</span>
      </div>
      
      <button class="btn-primary" onclick="openApp()" id="enterBtn">
        Открыть кассу
        <svg class="icon"><use href="#icon-arrow"/></svg>
      </button>
      
      <p class="note">Мобильная касса v2.0 &bull; Работает офлайн</p>
    </div>
  </div>

  <!-- Mobile App -->
  <div id="app" class="page hidden">
    <div class="phone-frame">
      <div class="phone-header">
        <span class="status-bar"></span>
        <button class="theme-toggle-small" onclick="toggleTheme()">
          <svg class="icon-sm"><use href="#icon-sun"/></svg>
        </button>
      </div>
      
      <div class="app-header">
        <button class="back-btn hidden" onclick="goBack()" id="backBtn">
          <svg class="icon"><use href="#icon-arrow-left"/></svg>
        </button>
        <h2 id="appTitle">Главная</h2>
        <div class="header-actions">
          <span id="headerTime" class="header-time"></span>
        </div>
      </div>
      
      <div class="app-content" id="content">
      </div>
      
      <div class="bottom-nav" id="bottomNav"></div>
    </div>
    
    <button class="btn-exit" onclick="closeApp()">На главную</button>
  </div>
